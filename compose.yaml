services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      POSTGRES_USER: sparkstral
      POSTGRES_PASSWORD: sparkstral
      POSTGRES_DB: sparkstral
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkstral -d sparkstral"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # python:3.13-slim has no curl; use stdlib (same interpreter as the app)
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; r=u.urlopen('http://127.0.0.1:8000/api/health', timeout=5); assert r.status==200",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  workflow-worker:
    build: ./workflow_worker
    env_file: .env
    environment:
      - BACKEND_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
